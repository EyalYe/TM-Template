# ═══════════════════════════════════════════════════════════════════════════
#  apps.yaml — your device's configuration. This is the ONLY file you edit.
#
#  It has two parts:
#    core:  the TaskMaster-C3 OS — a SEALED dependency. Pin a version (a release tag);
#           never fork or edit it. Everything the OS does is fixed and immutable.
#    apps:  YOUR apps. Each is a self-registering component (this repo's apps/, or a
#           git repo). Add one entry per app; that's all it takes.
#
#  A build hook compiles this into main/idf_component.yml (generated, git-ignored) —
#  you never touch that, and you never touch the core.
# ═══════════════════════════════════════════════════════════════════════════
core:
  git: https://github.com/EyalYe/TaskMaster.git
  path: components/taskmaster_core
  version: v1.2.1        # pin a release tag; bump it to adopt a newer core

apps:
  # Your starter app (in this repo). Rename / copy the apps/app_skeleton folder to
  # make your own; each app just needs its own folder + a TASKMASTER_REGISTER_APP.
  - name: app_skeleton
    path: apps/app_skeleton

  # An app can also come from its own repo (device app in a subdir) — that's all it
  # takes. See the worked examples: github.com/EyalYe/TM-Pomodoro and .../TM-ToDo.
  # - name: my_app
  #   git: https://github.com/you/my_app.git
  #   path: app
  #   version: main
